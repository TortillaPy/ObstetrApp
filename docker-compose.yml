services:
  # 1. Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: obstetrapp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_DB: ${POSTGRES_DB:-obstetrapp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-obstetrapp_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Servidor Backend API Express
  backend:
    build:
      context: './ObstetrApp Backend'
      dockerfile: Dockerfile
    container_name: obstetrapp_backend
    restart: always
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-12345678}@db:5432/${POSTGRES_DB:-obstetrapp_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-ingresa_aqui_una_clave_secreta_larga_y_aleatoria_para_jwt}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:80}
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy

  # 3. Servidor Frontend Nginx + Single Page Application (SPA)
  frontend:
    build:
      context: './ObstetrApp Frontend'
      dockerfile: Dockerfile
    container_name: obstetrapp_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
